defaults:
  n_iter: 12000
  burn: 4000
  thin: 5
  chains: 2
  seed: 12345
  n_transform: log100
  covariance_structure: e_zeta_only
  coefficient_constraints:
    enabled: false
    max_tries: 1000
    positive: []
    bounds: {}
run_data_specs:
  - inv_markup
  - output_gap_bn
  - unemployment_gap
data_specs:
  inv_markup:
    label: Inverse markup gap
    pi_col: pi_cpi
    pi_prev_col: pi_cpi_prev
    pi_expect_col: Epi
    x_col: markup_BN_inv
    x_prev_col: markup_BN_inv_prev
    n_col: N_Gustavo
  output_gap_bn:
    label: Output gap, BN filter
    pi_col: pi_cpi
    pi_prev_col: pi_cpi_prev
    pi_expect_col: Epi
    x_col: output_gap_BN
    x_prev_col: output_gap_BN_prev
    n_col: N_Gustavo
  unemployment_gap:
    label: Unemployment gap
    pi_col: pi_cpi
    pi_prev_col: pi_cpi_prev
    pi_expect_col: Epi
    x_col: unemp_gap
    x_prev_col: unemp_gap_prev
    n_col: N_Gustavo
  default:
    label: Output gap, BN filter
    pi_col: pi_cpi
    pi_prev_col: pi_cpi_prev
    pi_expect_col: Epi
    x_col: output_gap_BN
    x_prev_col: output_gap_BN_prev
    n_col: N_Gustavo
models:
  - ces
  - hsa_steady
  - hsa_dynamic
  - hsa_full
