<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NKPC-HSA — Estimation Report</title>
<style>
:root{
  --bg:#ffffff;--panel:#f6f7f9;--ink:#1c2230;--muted:#5f6877;--faint:#98a0ad;--hair:#e6e9ef;--soft:#f2f4f8;
  --accent:#4a56c8;--pr:#a9b1bf;--zero:#cf5a4e;--good:#128a5c;--goodbg:#e4f4ec;--warn:#c2532c;
  --m-ces:#8b93a4;--m-hsa_steady:#3b74e8;--m-hsa_dynamic:#0f9f7a;--m-hsa_full:#e0871a;--m-hsa_const_theta:#9b59b6;
  --ui:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --math:"Cambria","Palatino Linotype","Book Antiqua",Georgia,"Times New Roman",serif;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#0f131a;--panel:#141922;--ink:#e6eaf1;--muted:#98a2b2;--faint:#69707e;--hair:#242c35;--soft:#1a212b;
  --accent:#8189ee;--pr:#586475;--zero:#e0685e;--good:#35c489;--goodbg:#12271e;--warn:#e8905a;
  --m-ces:#98a1b2;--m-hsa_steady:#5b93ff;--m-hsa_dynamic:#22c39b;--m-hsa_full:#f0a63f;--m-hsa_const_theta:#b47bd8;
}}
:root[data-theme="light"]{--bg:#ffffff;--panel:#f6f7f9;--ink:#1c2230;--muted:#5f6877;--faint:#98a0ad;--hair:#e6e9ef;--soft:#f2f4f8;--accent:#4a56c8;--pr:#a9b1bf;--zero:#cf5a4e;--good:#128a5c;--goodbg:#e4f4ec;--warn:#c2532c;--m-ces:#8b93a4;--m-hsa_steady:#3b74e8;--m-hsa_dynamic:#0f9f7a;--m-hsa_full:#e0871a;--m-hsa_const_theta:#9b59b6;}
:root[data-theme="dark"]{--bg:#0f131a;--panel:#141922;--ink:#e6eaf1;--muted:#98a2b2;--faint:#69707e;--hair:#242c35;--soft:#1a212b;--accent:#8189ee;--pr:#586475;--zero:#e0685e;--good:#35c489;--goodbg:#12271e;--warn:#e8905a;--m-ces:#98a1b2;--m-hsa_steady:#5b93ff;--m-hsa_dynamic:#22c39b;--m-hsa_full:#f0a63f;--m-hsa_const_theta:#b47bd8;}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--ui);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
.app{display:flex;align-items:flex-start}
/* sidebar */
.side{width:238px;flex:none;position:sticky;top:0;height:100vh;overflow:auto;border-right:1px solid var(--hair);
  background:var(--panel);padding:18px 14px}
.brand{font-weight:680;font-size:15px;letter-spacing:-.01em;margin:2px 6px 3px}
.brand small{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:6px}
.nav{display:flex;flex-direction:column;gap:1px;margin-top:10px}
.nav a{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;
  color:var(--muted);text-decoration:none;font-size:13.5px;cursor:pointer}
.nav a:hover{background:var(--soft);color:var(--ink)}
.nav a.on{background:var(--accent);color:#fff}
.nav a .c{font-family:var(--mono);font-size:10.5px;opacity:.7}
.nav .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:14px 8px 4px}
/* main */
.main{flex:1;min-width:0;padding:26px 30px 90px;max-width:1080px}
h1{font-size:23px;font-weight:680;letter-spacing:-.01em;margin:0 0 4px}
h2.spec{font-size:20px;font-weight:660;margin:0 0 2px}
.lead{color:var(--muted);font-size:13.5px;max-width:74ch;margin:0 0 18px}
.block{border-top:1px solid var(--hair);padding:20px 0 8px;scroll-margin-top:12px}
.bhead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.bhead h3{font-size:16px;font-weight:660;margin:0}
.bmeta{font-family:var(--mono);font-size:11px;color:var(--faint)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 16px;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:3}
.chip{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--hair);
  border-radius:999px;padding:4px 11px;cursor:pointer;text-decoration:none}
.chip:hover{border-color:var(--accent);color:var(--ink)}
.sub{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin:16px 0 6px}
/* tables */
.tw{overflow-x:auto;border:1px solid var(--hair);border-radius:10px;margin-bottom:6px}
table{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
th,td{padding:7px 11px;text-align:right;border-bottom:1px solid var(--hair);white-space:nowrap}
th:first-child,td:first-child{text-align:left}
thead th{font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--faint);font-weight:600;background:var(--soft)}
tbody tr:last-child td{border-bottom:0}
td .mean{font-weight:600;font-family:var(--mono);font-size:12.5px}
td .ci{display:block;font-family:var(--mono);font-size:10px;color:var(--faint)}
td.model{font-weight:600;color:var(--c)}
.phead{font-family:var(--math);font-style:italic;font-size:15px;color:var(--ink)}
.phead sub{font-size:.66em;font-style:normal}
.bf{font-family:var(--mono);font-weight:600}
.bf.sig{color:var(--good)}
.pill{display:inline-block;font-family:var(--mono);font-size:10.5px;padding:1px 6px;border-radius:5px;background:var(--soft);color:var(--faint)}
.pill.sig{background:var(--goodbg);color:var(--good);font-weight:600}
.note{color:var(--faint);font-size:11.5px;margin:6px 2px 0;max-width:76ch}
/* figures */
.figs{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;margin-top:6px}
figure{margin:0;border:1px solid var(--hair);border-radius:10px;overflow:hidden;background:var(--panel);cursor:zoom-in}
figure img{width:100%;display:block;background:#fff}
figcaption{font-family:var(--mono);font-size:11px;color:var(--muted);padding:7px 10px;border-top:1px solid var(--hair)}
/* math block */
.eqbox{background:var(--panel);border:1px solid var(--hair);border-radius:11px;padding:16px 18px;margin:6px 0 10px;
  font-family:var(--math);font-size:16px;line-height:2.3;overflow-x:auto}
.eqbox i{font-style:italic}.eqbox b{color:var(--accent);font-weight:700}
.eqbox sub,.eqbox sup{font-size:.66em}.eqbox .lab{font-family:var(--ui);font-style:normal;font-size:11.5px;color:var(--faint);letter-spacing:.04em;text-transform:uppercase;margin-right:8px}
.ov{text-decoration:overline;text-decoration-thickness:1px}
.ht{position:relative;display:inline-block}
.ht::before{content:"^";position:absolute;left:50%;top:-.5em;transform:translateX(-50%);font-style:normal;font-size:.8em;line-height:1}
.nleg{font-family:var(--ui);font-size:11.5px;color:var(--faint);margin:0 0 18px 2px}
.nleg .ov,.nleg .ht{font-family:var(--math);font-style:italic;color:var(--muted)}
ul.conv{margin:4px 0 18px;padding-left:18px;color:var(--muted);font-size:13px;max-width:78ch}
ul.conv li{margin:3px 0}
/* lightbox */
.lb{position:fixed;inset:0;background:rgba(10,13,20,.82);display:flex;align-items:center;justify-content:center;
  z-index:60;padding:24px;cursor:zoom-out}
.lb img{max-width:94vw;max-height:92vh;border-radius:8px;background:#fff;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lb .cap{position:fixed;bottom:16px;left:0;right:0;text-align:center;color:#cdd3dd;font-family:var(--mono);font-size:12px}
.topbar{display:none}
@media (max-width:840px){
  .app{flex-direction:column}
  .side{position:static;width:100%;height:auto;border-right:0;border-bottom:1px solid var(--hair)}
  .nav{flex-direction:row;flex-wrap:wrap}.nav .lbl{width:100%}
  .main{padding:20px 16px 80px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style></head>
<body><div class="app">
  <aside class="side">
    <div class="brand"><small>NKPC · HSA · MCMC</small>Estimation Report</div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main" id="main"></main>
</div>
<div id="lbroot"></div>
<script>
const DATA = __DATA__;
const MLBL={ces:"CES",hsa_steady:"HSA steady",hsa_dynamic:"HSA dynamic",hsa_const_theta:"HSA const-θ",hsa_full:"HSA full"};
const GL={alpha:"α",kappa:"κ",kappa_0:"κ<sub>0</sub>",delta:"δ",theta:"θ",theta_0:"θ<sub>0</sub>",gamma:"γ",
  rho_1:"ρ<sub>1</sub>",rho_2:"ρ<sub>2</sub>",phi_1:"φ<sub>1</sub>",n:"n",sigma_e:"σ<sub>e</sub>",sigma_N:"σ<sub>N</sub>"};
const KEY=["alpha","kappa","kappa_0","delta","theta","theta_0","gamma"];
const DYN=["rho_1","rho_2","phi_1","n","sigma_e","sigma_N"];
const NB='<span class="ov"><i>N</i></span>', NH='<span class="ht"><i>N</i></span>';
const fmt=v=>v==null?"":(v>=0?"+":"")+v.toFixed(3);
function restr(s){return s.replace("kappa_0","κ₀").replace("theta_0","θ₀").replace("kappa","κ").replace("theta","θ").replace("delta","δ").replace("gamma","γ");}

function coeffTable(co,params){
  const ps=params.filter(p=>co.models.some(m=>(co.cell[m]||{})[p]));
  if(!ps.length) return "";
  let h='<div class="tw"><table><thead><tr><th>model</th>'+ps.map(p=>`<th><span class="phead">${GL[p]||p}</span></th>`).join("")+'</tr></thead><tbody>';
  for(const m of co.models){
    h+=`<tr><td class="model" style="--c:var(--m-${m})">${MLBL[m]}</td>`;
    for(const p of ps){const e=(co.cell[m]||{})[p];
      h+= e?`<td><span class="mean">${fmt(e[0])}</span><span class="ci">[${e[1].toFixed(3)}, ${e[2].toFixed(3)}]</span></td>`:`<td style="color:var(--faint)">·</td>`;}
    h+="</tr>";
  }
  return h+"</tbody></table></div>";
}
function sddrTable(sd){
  if(!sd||!sd.length) return "";
  let h='<div class="tw"><table><thead><tr><th>model</th><th>restriction</th><th>BF₁₀</th><th>evidence</th></tr></thead><tbody>';
  for(const [m,r,bf] of sd){
    const sig=bf!=null&&bf>3;
    const ev=bf==null?"—":sig?"for effect":bf<0.33?"for null":"inconclusive";
    h+=`<tr><td class="model" style="--c:var(--m-${m})">${MLBL[m]}</td><td style="font-family:var(--math);font-style:italic">${restr(r)}</td>
      <td class="bf ${sig?'sig':''}">${bf==null?"—":(bf<10?bf.toFixed(2):Math.round(bf))}</td>
      <td><span class="pill ${sig?'sig':''}">${ev}</span></td></tr>`;
  }
  return h+"</tbody></table></div>";
}
function mcTable(mc){
  if(!mc||!mc.length) return "";
  let h='<div class="tw"><table><thead><tr><th>model</th><th>predictive score</th><th>log ML (Chib)</th><th>BF vs CES</th></tr></thead><tbody>';
  for(const [m,ps,ml,bf] of mc){
    const bfs = bf==null?"—":(bf>=1e6||bf<=1e-6)?bf.toExponential(1):bf.toFixed(2);
    h+=`<tr><td class="model" style="--c:var(--m-${m})">${MLBL[m]}</td>
      <td>${ps==null?"—":ps.toFixed(1)}</td><td>${ml==null?"—":ml.toFixed(1)}</td><td>${bfs}</td></tr>`;
  }
  return h+"</tbody></table></div>";
}
function figGrid(fg){
  if(!fg||!fg.length) return "";
  return '<div class="figs">'+fg.map(([cap,src])=>
    `<figure data-src="${src}" data-cap="${cap}"><img loading="lazy" src="${src}" alt="${cap}"><figcaption>${cap}</figcaption></figure>`).join("")+"</div>";
}

function renderOverview(){
  const hl=DATA.overview.headline||[];
  let hlrows="";
  for(const [label,k0,d,bf] of hl){
    const sig=bf!=null&&bf>3, pos=d&&d[0]>0;
    const verdict=bf==null?"—":sig?(pos?"δ &gt; 0 (identified)":"δ ≠ 0"):"not identified";
    hlrows+=`<tr><td>${label}</td>
      <td>${k0?`<span class="mean">${fmt(k0[0])}</span>`:"·"}</td>
      <td>${d?`<span class="mean">${fmt(d[0])}</span><span class="ci">[${d[1].toFixed(3)}, ${d[2].toFixed(3)}]</span>`:"·"}</td>
      <td class="bf ${sig?'sig':''}">${bf==null?"—":(bf<10?bf.toFixed(2):Math.round(bf))}</td>
      <td><span class="pill ${sig&&pos?'sig':''}">${verdict}</span></td></tr>`;
  }
  return `<h1>NKPC-HSA Bayesian State-Space Estimation</h1>
   <p class="lead">Heterogeneous strategic-complementarity Phillips curve estimated by Gibbs/FFBS across four models and five activity measures. This report collects the coefficient tables, Savage–Dickey ratios, prior-vs-posterior figures, time-varying slope paths, and model comparison for every condition. Pick an activity measure on the left.</p>

   <div class="sub">Model specifications</div>
   <div class="eqbox">
     <span class="lab">Inflation</span><i>π</i><sub>t</sub> = <i>α</i>&thinsp;<i>π</i><sub>t−1</sub> + (1−<i>α</i>)&thinsp;<i>E</i><sub>t</sub><i>π</i><sub>t+1</sub> + <b>κ<sub>t</sub></b>&thinsp;<i>x</i><sub>t</sub> − <b>θ<sub>t</sub></b>&thinsp;${NH}<sub>t</sub> + <i>e</i><sub>t</sub><br>
     <span class="lab">Slopes</span><i>κ</i><sub>t</sub> = <i>κ</i><sub>0</sub> + <i>δ</i>&thinsp;${NB}<sub>t</sub> &nbsp;&nbsp;&nbsp; <i>θ</i><sub>t</sub> = <i>θ</i><sub>0</sub> + <i>γ</i>&thinsp;${NB}<sub>t</sub><br>
     <span class="lab">Competition</span><i>N</i><sup>obs</sup><sub>t</sub> = ${NB}<sub>t</sub> + ${NH}<sub>t</sub> + <i>ν</i><sub>t</sub> &nbsp;·&nbsp; ${NH}<sub>t</sub> = <i>ρ</i><sub>1</sub>&thinsp;${NH}<sub>t−1</sub> + <i>ρ</i><sub>2</sub>&thinsp;${NH}<sub>t−2</sub> + <i>u</i><sub>t</sub> &nbsp;·&nbsp; ${NB}<sub>t</sub> = <i>n</i> + ${NB}<sub>t−1</sub> + <i>ε</i><sub>t</sub><br>
     <span class="lab">Activity</span><i>x</i><sub>t</sub> = <i>φ</i><sub>1</sub>&thinsp;<i>x</i><sub>t−1</sub> + <i>ζ</i><sub>t</sub>
   </div>
   <p class="nleg">${NB} = competition trend&nbsp;·&nbsp;${NH} = deviation from trend (“gap”)&nbsp;·&nbsp;CES benchmark sets <i>δ</i>=<i>θ</i>=0; HSA-steady adds <i>δ</i>; HSA-dynamic adds a static <i>θ</i>; HSA-full adds both plus <i>γ</i>.</p>

   <div class="sub">Headline — HSA steady, baseline · full · quarterly</div>
   <div class="tw"><table><thead><tr><th>activity measure</th><th><span class="phead">κ<sub>0</sub></span></th><th><span class="phead">δ</span></th><th>BF₁₀(δ)</th><th>verdict</th></tr></thead><tbody>${hlrows}</tbody></table></div>
   <p class="note">δ is the interaction of the Phillips slope with the competition trend (<i>κ</i><sub>t</sub> = <i>κ</i><sub>0</sub> + <i>δ</i> N̄<sub>t</sub>). BF₁₀ is the Savage–Dickey ratio against δ=0; &gt;3 (green) means the data move the posterior off zero. Only the unemployment-gap measure identifies a significant δ.</p>

   <div class="sub">Conventions</div>
   <ul class="conv">
     <li>Competition transform: <i>N</i><sup>model</sup> = (100·log <i>N</i> − mean) / 10, so δ, θ, θ<sub>0</sub>, γ are effects per ten-log-point move in the relevant N component.</li>
     <li>Priors for κ, κ<sub>0</sub>, δ are in physical units; the sampler uses KAPPA_SCALE=100 internally but all draws, tables, figures and SDDR are reported in physical units.</li>
     <li>Model comparison log-ML is Chib; for HSA-full it is conditional on posterior-mean latent states (nonlinear observation eq.). Annual-Q4 log-ML is unreliable — read predictive score and SDDR there.</li>
   </ul>`;
}

function renderSpec(spec){
  const blocks=(DATA.blocks||{})[spec]||[];
  const label=DATA.labels[spec];
  let chips=blocks.map((b,i)=>`<a class="chip" href="#${spec}::${i}" onclick="jump('${spec}',${i});return false">${b.t}</a>`).join("");
  let body="";
  blocks.forEach((b,i)=>{
    body+=`<section class="block" id="blk-${spec}-${i}">
      <div class="bhead"><h3>${b.t}</h3><span class="bmeta">${b.meta}</span></div>`;
    if(b.co){
      body+=`<div class="sub">NKPC coefficients — mean [95% CI]</div>${coeffTable(b.co,KEY)}`;
      const dyn=coeffTable(b.co,DYN); if(dyn) body+=`<div class="sub">Dynamics &amp; shock scales</div>${dyn}`;
    }
    if(b.sd) body+=`<div class="sub">Savage–Dickey density ratios (BF₁₀ = evidence for effect)</div>${sddrTable(b.sd)}`;
    if(b.mc) body+=`<div class="sub">Model comparison</div>${mcTable(b.mc)}`;
    if(b.fg&&b.fg.length) body+=`<div class="sub">Figures</div>${figGrid(b.fg)}`;
    body+="</section>";
  });
  return `<h2 class="spec">${label}</h2><p class="lead">${blocks.length} conditions — baseline, mixed-frequency, restricted, prior and sub-sample robustness. Click any figure to enlarge.</p>
    <div class="chips">${chips}</div>${body}`;
}

function jump(spec,i){const el=document.getElementById(`blk-${spec}-${i}`); if(el) el.scrollIntoView({behavior:"smooth",block:"start"});}
window.jump=jump;

function renderNav(){
  const nav=document.getElementById("nav");
  let h=`<a data-r="overview">Overview</a><div class="lbl">Activity measures</div>`;
  for(const s of DATA.specs){const n=((DATA.blocks||{})[s]||[]).length;
    h+=`<a data-r="${s}">${DATA.labels[s]}<span class="c">${n}</span></a>`;}
  nav.innerHTML=h;
  nav.querySelectorAll("a").forEach(a=>a.onclick=()=>{location.hash=a.dataset.r;});
}
function route(){
  const r=(location.hash||"#overview").slice(1).split("::")[0];
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("on",a.dataset.r===r));
  const main=document.getElementById("main");
  main.innerHTML = (r==="overview"||!DATA.labels[r]) ? renderOverview() : renderSpec(r);
  main.querySelectorAll("figure").forEach(f=>f.onclick=()=>lightbox(f.dataset.src,f.dataset.cap));
  window.scrollTo(0,0);
  const anchor=(location.hash||"").split("::")[1];
  if(anchor!=null) setTimeout(()=>jump(r,parseInt(anchor)),40);
}
function lightbox(src,cap){
  const root=document.getElementById("lbroot");
  root.innerHTML=`<div class="lb" id="lb"><img src="${src}" alt="${cap}"><div class="cap">${cap}</div></div>`;
  const close=()=>root.innerHTML="";
  document.getElementById("lb").onclick=close;
  document.addEventListener("keydown",function esc(e){if(e.key==="Escape"){close();document.removeEventListener("keydown",esc);}});
}
renderNav();
window.addEventListener("hashchange",route);
route();
</script>
</body></html>
